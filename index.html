<script>
(function(){
'use strict';
window._app={};

const POOL={
  1:["Ludvig Aberg","Patrick Cantlay","Tommy Fleetwood","Rory McIlroy","Collin Morikawa","Xander Schauffele"],
  2:["Ben Griffin","Russell Henley","Viktor Hovland","Robert MacIntyre","J.J. Spaun","Justin Thomas"],

  11:["Thomas Detry","Harry Hall","Tom Hoge","Chris Kirk","Kurt Kitayama","Min Woo Lee"],
  12:["Byeong Hun An","Christiaan Bezuidenhout","Bud Cauley","Nico Echavarria","Matt McCarty","Jhonattan Vegas"],
  13:["Eric Cole","Steven Fisk","Rico Hoey","Nicolai Hojgaard","Max McGreevy","Michael Thorbjornsen"],
  14:["Emiliano Grillo","Keith Mitchell","Davis Riley","Davis Thompson","Erik Van Rooyen","Kevin Yu"],

};

const TEAMS={
  brady:{name:"Brady MacDowell",short:"Brady",init:"B",color:"#C9A664",picks:[
    "Xander Schauffele","Ben Griffin","Cameron Young","Corey Conners","Chris Gotterup","Sungjae Im",
    "Si Woo Kim","Ryan Gerard","J.T. Poston","Max Homa","Kurt Kitayama","Bud Cauley",
    "Rico Hoey","Davis Riley","Patrick Rodgers","Garrick Higgo"]},
  jones:{name:"Ben Jones",short:"Ben",init:"J",color:"#3A6094",picks:[
    "Rory McIlroy","Ben Griffin","Cameron Young","Sepp Straka","Andrew Novak","Sungjae Im",
    "Si Woo Kim","Jacob Bridgeman","J.T. Poston","Tom Kim","Tom Hoge","Nico Echavarria",
    "Eric Cole","Kevin Yu","Patrick Rodgers","Garrick Higgo"]},
  coombs:{name:"Richard Coombs",short:"Richard",init:"R",color:"#9B4A4A",picks:[
    "Rory McIlroy","Russell Henley","Keegan Bradley","Corey Conners","Max Greyserman","Aaron Rai",
    "Wyndham Clark","Jacob Bridgeman","Denny McCarthy","Billy Horschel","Kurt Kitayama","Christiaan Bezuidenhout",
    "Eric Cole","Davis Thompson","Stephan Jaeger","Michael Brennan"]},
};

const GC={1:"#7C3F1D",2:"#A85B2A",3:"#C97B3F",4:"#3D5A4A",5:"#5C7A5E",6:"#7E946D",
  7:"#1F3A52",8:"#3B5E7A",9:"#5C7E9C",10:"#6B2E5C",11:"#8B4674",12:"#A66B91",
  13:"#5D4A2E",14:"#7D6841",15:"#9A8456",16:"#4D4D4D"};


// ── helpers ──────────────────────────────────────────────────────────────────
function norm(n){return(n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\./g,'').replace(/\s+/g,' ').trim()}
const ALIAS={'johnny keefer':'john keefer','c bezuidenhout':'christiaan bezuidenhout','m thorbjornsen':'michael thorbjornsen'};
function can(n){const k=norm(n);return ALIAS[k]||k}
const N2G={};Object.entries(POOL).forEach(([g,ps])=>ps.forEach(p=>{N2G[can(p)]=+g}));
const OWN={};Object.entries(TEAMS).forEach(([k,t])=>t.picks.forEach(p=>{const c=can(p);if(!OWN[c])OWN[c]=[];OWN[c].push(k)}));
// Whitelist safeguard: only canonical names on the official pool list (ALL_POOL)
// are ever recognized — anything else gets no group and no owner.
const getG=n=>{const c=matchToPool(n);return ALL_POOL.includes(c)?N2G[c]:null;};
const owners=n=>{const c=matchToPool(n);return ALL_POOL.includes(c)?(OWN[c]||[]):[];};
const ownedBy=(n,k)=>owners(n).includes(k);
const tv=t=>(!t||t==='E'||t==='-')?0:parseInt(t,10)||0;
const pv=p=>{if(p==='CUT'||p==='WD')return 9999;const n=parseInt((p||'').replace(/^T/,''),10);return isNaN(n)?9998:n};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── state ─────────────────────────────────────────────────────────────────────
// All 96 pool players - seed seen list so cut detection works from day 1
const ALL_POOL=Object.values(POOL).flat().map(can);
// canonical name -> proper display name (for the Combos player picker)
const CANON2DISP={};Object.values(POOL).flat().forEach(p=>{CANON2DISP[can(p)]=p});
// Match an ESPN name to a pool player by its FULL normalized name (aliases applied).
// No first-initial + last-name fuzzy fallback: that collapsed distinct players onto
// one key (e.g. "T.K. Kim" → "Tom Kim", tagging him into Group 10 / Ben Jones's team).
// The whitelist safeguard lives in getG()/owners(): a name is recognized only when
// its canonical form is an actual pool player (ALL_POOL), so any ESPN name off the
// official whitelist gets no group/owner and never appears in Groups, Team, or Combos.
function matchToPool(n){return can(n);}

// Confirmed NOT in our pool: ESPN names that share a surname with a pool player
// but are a different person. Listed here so the coverage check below stays quiet
// about them — they correctly score $0 (no team holds them). NEVER alias these to
// the pool player; that would fold a stranger's money onto the wrong golfer.
// (T.K. Kim is not in the pool — he was previously mis-tagged as Tom Kim.)
//   • Lanto Griffin ≠ Ben Griffin   • Chan Kim ≠ Michael/Si Woo/Tom Kim
//   • Carson Young ≠ Cameron Young  (all John Deere 2026 field namesakes)
const NOT_POOL=new Set(['tk kim','lanto griffin','chan kim','carson young']);

// ── Weekly pool coverage check ────────────────────────────────────────────────
// Now that matching is strict (exact full name + aliases), a real pool player whose
// ESPN name is formatted in a new way would silently get no group/owner. To make
// that impossible to overlook, every refresh we scan the field for any unmatched
// ESPN competitor that shares a surname with a pool player and report it — these
// are exactly the cases worth a human glance: either a real entrant ESPN spelled
// differently (add an ALIAS) or a genuine namesake to add to NOT_POOL. Results are
// logged to the console and exposed at window._app.coverage; confirmed namesakes in
// NOT_POOL are skipped so the signal stays clean.
function poolCoverage(players){
  const surToPool={};
  ALL_POOL.forEach(c=>{const s=c.split(' ').pop();(surToPool[s]=surToPool[s]||[]).push(c);});
  const suspects=[];
  (players||[]).forEach(p=>{
    const c=can(p.name);
    if(ALL_POOL.includes(c)||NOT_POOL.has(c))return; // matched, or a known non-pool namesake
    const cand=surToPool[c.split(' ').pop()];
    if(cand&&cand.length)suspects.push({espn:p.name,candidates:cand.map(k=>CANON2DISP[k]||k)});
  });
  if(suspects.length){
    console.warn('[pool coverage] '+suspects.length+' unmatched ESPN name(s) share a surname with a pool player — review for a missing alias or namesake:');
    suspects.forEach(s=>console.warn('  • ESPN "'+s.espn+'" → pool candidate(s): '+s.candidates.join(', ')));
  }
  return suspects;
}
const S={
  team:(()=>{try{return localStorage.getItem('bz-team')||'brady'}catch{return'brady'}})(),
  view:'board',players:[],status:'',updated:'',refreshing:false,error:null,group:null,stSearch:'',poolData:null,seen:ALL_POOL,comboSel:[],comboSearch:'',poolOpen:null,
  tournamentName:'Byron Nelson',venueName:'TPC Craig Ranch',round:1,isFinal:false,moneyComplete:false,officialFinal:false,isPreTournament:false,startDate:'',nifExpanded:false
};
try{
  const ck=localStorage.getItem('bz-current-key');
  if(ck){const c=localStorage.getItem(ck);if(c){const d=JSON.parse(c);
    S.players=d.players;S.updated=d.updated||'';S.status=d.status||'';
    S.seen=[...new Set([...ALL_POOL,...(d.seen||[])])];
    S.tournamentName=d.tournamentName||'Byron Nelson';
    S.venueName=d.venueName||'TPC Craig Ranch';
    S.startDate=d.startDate||'';
    const ti=getTournamentInfo(S.tournamentName);PO=calcPO(d.purse||ti.purse,ti.curve);MC_PAY=ti.mcPay;
  }}
}catch{}

// ── Authoritative winner override ───────────────────────────────────────────
// ESPN only fills winnerName once it flips an event to Final AND publishes the
// champion. After a Monday playoff that followed a darkness suspension, the event
// can sit "Suspended" (or Final-without-winner) for hours while the leaders read
// as a tied T1 — during which projPay() splits 1st+2nd evenly across the playoff
// pair (e.g. it paid the Travelers champion the $2.89M split instead of the real
// $3.6M, shorting every team holding him by $710K). Pin the confirmed champion
// here and they take sole 1st immediately, even before ESPN catches up. ESPN's own
// winnerName still takes precedence when present; remove an entry once the event
// rolls off the scoreboard. Matched by tournament-name keyword.
const WINNER_OVERRIDE=[
  ['travelers','Viktor Hovland'],   // 2026 Travelers: Hovland def. Scheffler in a Monday playoff
];
function overrideWinner(tname){
  const n=(tname||'').toLowerCase();
  for(const[kw,w]of WINNER_OVERRIDE)if(n.includes(kw))return w;
  return'';
}

// ── ESPN parse ────────────────────────────────────────────────────────────────
function parseESPN(data){
  const comp=data?.events?.[0]?.competitions?.[0];if(!comp)return null;
  const cs=comp.competitors||[];
  if(!cs.length)return null;

  // ── Round detection: based purely on actual hole/score data, never ESPN's counter ──
  // A round "has data" if any player has holes played OR a non-zero value in that slot
  const roundHasData=idx=>cs.some(c=>{
    const ls=(c.linescores||[])[idx];
    if(!ls)return false;
    return((ls.linescores||[]).length>0)||(ls.value!=null&&ls.value!==0&&!isNaN(ls.value));
  });
  const r1=roundHasData(0),r2=roundHasData(1),r3=roundHasData(2),r4=roundHasData(3);
  const round=r4?4:r3?3:r2?2:1;
  const isR4=r4;
  const isR3Plus=r3||r4;

  // ── ESPN live cut line ──────────────────────────────────────────────────────
  // ESPN publishes the real cut line (cutScore) + count (cutCount) per event in
  // the tournament object (relayed by api/scores.js as ev.cut). ESPN knows each
  // event's rule and updates it in real time, so we trust it rather than guess.
  // This lets us drop missed-cut players to $0 the moment the math is clear —
  // before ESPN posts Saturday tee times. Guarded so no-cut events never trip it:
  // require we've reached the cut round and that a real cut exists (0<count<field).
  // CRITICAL: only use the cutScore line to fill the gap BEFORE round-3 scoring
  // starts. cutScore is the 36-hole line; once R3 is underway a player's total
  // includes R3 progress, so a made-cut player playing a bad Saturday (e.g. +5
  // after R2 -> +12 in R3) would falsely exceed it. Once isR3Plus, the tee-time/
  // round-3-data logic (isCutByR3) governs — it keys off absence from the R3
  // field, which stays correct no matter how made-cut players score.
  const espnCut=data?.events?.[0]?.cut||null;
  const cutLineActive=!isR3Plus && !!espnCut && espnCut.score!=null && espnCut.round!=null
    && (espnCut.currentRound==null||espnCut.currentRound>=espnCut.round)
    && espnCut.count!=null && espnCut.count>0 && espnCut.count<cs.length;
  const parScore=v=>{const s=String(v==null?'':v).toUpperCase().trim();
    if(s==='E')return 0;if(!s||s==='CUT'||s==='MC'||s==='WD'||s==='DQ')return null;
    const n=parseInt(s.replace('+',''),10);return isNaN(n)?null:n;};

  // ── Parse each player ──────────────────────────────────────────────────────
  const parsed=cs.map(c=>{
    const name=c.athlete?.fullName||c.athlete?.displayName||'';
    const order=c.order??9999;
    const sn=(c.status?.type?.name||'').toLowerCase();
    const sd=(c.status?.type?.shortDetail||c.status?.displayValue||'').toLowerCase();
    const scoreVal=(c.score||'').toUpperCase();
    const isWD=sn.includes('withdraw')||sn==='wd'||sd.includes('wd')||scoreVal==='WD';
    const allLS=c.linescores||[];

    // ── Cut detection ─────────────────────────────────────────────────────
    const r3LS=allLS[2];
    const r3Holes=(r3LS?.linescores||[]).length;
    const r3HasData=r3Holes>0||(r3LS?.value!=null&&r3LS?.value!==0&&!isNaN(r3LS?.value));
    const r3TeeTime=r3LS?.statistics?.categories?.[0]?.stats?.[6]?.displayValue||'';
    const hasTeeTime=r3TeeTime.includes('PDT')||r3TeeTime.includes('EDT')||r3TeeTime.includes('CDT')||r3TeeTime.includes('CST')||r3TeeTime.includes('MST');
    const isCutByR3=isR3Plus&&!isR4&&!hasTeeTime&&!r3HasData&&!isWD&&allLS.length>=2;
    const isCutByR4=isR4&&!r3HasData&&allLS.length>=2;
    const isCutExplicit=sn.includes('cut')||sd.includes('cut')||scoreVal==='CUT'||scoreVal==='MC';
    // Real-time cut from ESPN's published line: worse than cutScore => missed cut.
    const myPar=parScore(c.score);
    const isCutByLine=cutLineActive&&!isWD&&myPar!=null&&myPar>espnCut.score;
    const isCut=isCutByR3||isCutByR4||isCutExplicit||isCutByLine;

    // ── Total score: sum rounds that have real data ───────────────────────
    const calcTotal=(()=>{
      const rounds=allLS.filter((l,i)=>{
        if(!l||l.period>4)return false;
        return((l.linescores||[]).length>0)||(l.value!=null&&l.value!==0&&!isNaN(l.value));
      });
      if(!rounds.length)return'E';
      const t=rounds.reduce((s,l)=>s+(l.value||0),0);
      return t===0?'E':t>0?`+${t}`:`${t}`;
    })();
    const total=c.score||calcTotal||'E';

    // ── Today/thru: read from the ACTIVE round slot ───────────────────────
    // activeRoundIdx = round-1 (0-indexed), capped at 3
    // This is derived from actual data above, never from ESPN's round counter
    const activeRoundIdx=Math.min(round-1,3);
    const activeLS=allLS[activeRoundIdx];
    const activeHoles=(activeLS?.linescores||[]).length;
    const activeVal=activeLS?.value;
    const today=isCut?'':(activeVal!=null&&activeVal!==0?(activeLS?.displayValue||''):'-');
    const thru=(!isCut&&activeHoles>0)?(activeHoles>=18?'F':`H${activeHoles}`):'';

    const earnings=(typeof c.earnings==='number')?c.earnings:null;
    return{name,total,order,isCut,isWD,today,thru,earnings};
  });

  // ── Rank players ──────────────────────────────────────────────────────────
  parsed.sort((a,b)=>a.order-b.order);
  const made=parsed.filter(p=>!p.isCut&&!p.isWD);
  const cut=parsed.filter(p=>p.isCut);
  // A sudden-death playoff leaves its participants tied on score, so position
  // cannot be derived from the scorecard alone. ESPN names the champion in the
  // event's winnerName (relayed by api/scores.js, set only once final). When the
  // leaders are tied and one of them is that champion, the champion takes sole
  // 1st and the other tied leader(s) drop to a tie at 2nd — otherwise projPay()
  // would split 1st+2nd money evenly across the playoff pair (e.g. the 2026
  // Memorial paid Poston $4.0M / Gerard $2.2M, not $3.1M each).
  const evt0=data?.events?.[0];
  const evtFinal=(evt0?.status?.type?.completed===true)||
    (evt0?.status?.type?.name||'').toLowerCase().includes('final');
  // ESPN's published champion wins; a manual override fills the gap while ESPN lags
  // on a playoff result. An override is authoritative even before the event is Final
  // (the playoff only moves the top two — the rest of the field is already at 72).
  const tname=evt0?.shortName||evt0?.name||'';
  const ovW=overrideWinner(tname);
  const winnerKey=evt0?.winnerName?can(evt0.winnerName):(ovW?can(ovW):'');
  const winnerAuthoritative=evtFinal||!!ovW;
  let i=0;
  while(i<made.length){
    let j=i;
    while(j<made.length&&made[j].total===made[i].total)j++;
    if(i===0&&(j-i)>1&&winnerAuthoritative&&winnerKey&&made.slice(i,j).some(p=>can(p.name)===winnerKey)){
      const rest=[];
      for(let k=i;k<j;k++){if(can(made[k].name)===winnerKey)made[k].pos='1';else rest.push(made[k]);}
      const lbl2=(rest.length>1?'T':'')+'2';
      rest.forEach(p=>p.pos=lbl2);
    }else{
      const lbl=(j-i)>1?'T'+(i+1):''+(i+1);
      for(let k=i;k<j;k++)made[k].pos=lbl;
    }
    i=j;
  }
  cut.forEach(p=>p.pos='CUT');

  // ── Final states ──────────────────────────────────────────────────────────
  const isFinal=(data?.events?.[0]?.status?.type?.completed===true)||
    (data?.events?.[0]?.status?.type?.name||'').toLowerCase().includes('final')||
    (data?.events?.[0]?.status?.type?.shortDetail||'').toLowerCase().includes('final');

  // Pre-tournament: no player has any non-zero score
  const anyNonZeroScore=cs.some(c=>{
    const s=parseInt((c.score||'').replace('E','0'),10);
    return!isNaN(s)&&s!==0;
  });
  const isPreTournament=!anyNonZeroScore;

  return{players:[...made,...cut],round,isFinal,isPreTournament};
}


// ── fetch ─────────────────────────────────────────────────────────────────────
async function fetchData(){
  S.refreshing=true;render();
  try{
    const r=await fetch('/api/scores',{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();const parsed=parseESPN(j);
    if(!parsed||!parsed.players.length)throw new Error('No data');
    S.players=parsed.players;S.round=parsed.round;S.isFinal=parsed.isFinal||false;S.isPreTournament=parsed.isPreTournament||false;S.error=null;
    try{window._app.coverage=poolCoverage(parsed.players);}catch{}
    S.updated=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    S.status=j?.events?.[0]?.status?.type?.detail||'';
    // Save all player names ESPN ever returned (to distinguish cut vs not in field)
    try{
      const prevKey=localStorage.getItem('bz-current-key')||'bz-cache-bn26';const prev=JSON.parse(localStorage.getItem(prevKey)||'{}');
      const prevSeen=prev.seen||[];
      const nowSeen=parsed.players.map(p=>matchToPool(p.name));
      const allSeen=[...new Set([...prevSeen,...nowSeen])];
      S.seen=allSeen;
      const newTname=j?.events?.[0]?.shortName||j?.events?.[0]?.name||S.tournamentName;
      if(newTname!==S.tournamentName)S.tournamentName=newTname;
      // Purse comes LIVE from ESPN (exact, current); the curve shape comes from
      // our verified tables. Fall back to the scheduled estimate only if ESPN
      // hasn't published the purse yet. Recomputed every refresh.
      const ti2=getTournamentInfo(S.tournamentName);
      const espnPurse=Number(j?.events?.[0]?.purse)||0;
      const usePurse=espnPurse>0?espnPurse:ti2.purse;
      S.purse=usePurse;S.purseLive=espnPurse>0;S.curve=ti2.curve;
      PO=calcPO(usePurse,ti2.curve);MC_PAY=ti2.mcPay;
      // ── Gate the "FINAL"/official state ──────────────────────────────────────
      // ESPN can flip an event to Final BEFORE it publishes per-player money and a
      // playoff champion (exactly the window that priced the Travelers champion as
      // a $2.89M split T1). So don't trust "Final" alone. Treat results as official
      // only when: ESPN says final, EVERY in-the-money golfer has a money figure,
      // and the payouts reconcile to the purse. Until then it's "Finalizing…".
      // moneyComplete also drives payForPlayer so payouts are all-or-nothing — all
      // real ESPN money, or all projected curve, never a mix of the two.
      const madeP=S.players.filter(p=>p.pos&&p.pos!=='CUT'&&p.pos!=='WD');
      S.moneyComplete=S.isFinal&&madeP.length>0&&madeP.every(p=>typeof p.earnings==='number');
      let reconciledOK=true;
      if((S.curve==='std'||S.curve==='sig')&&S.purse>0){
        const tmR={};S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')tmR[p.pos]=(tmR[p.pos]||0)+1});
        let totR=0;S.players.forEach(p=>{totR+=payForPlayer(p,tmR)});
        reconciledOK=Math.abs(totR-S.purse)/S.purse<=0.03;
      }
      S.officialFinal=S.isFinal&&S.moneyComplete&&reconciledOK;
      try{
        S.health=healthCheck();
        // An unmatched ESPN name that shares a surname with a pool player scores $0
        // for every team holding them (the old T.K. Kim failure) — promote that
        // signal out of the console and into the header so it can't be missed.
        const cov=window._app.coverage||[];
        if(cov.length)S.health=cov.map(s=>'Unmatched golfer "'+s.espn+'" — scoring $0; pool candidate(s): '+s.candidates.join(', ')+' (add an ALIAS or NOT_POOL entry)').concat(S.health);
        window._app.health=S.health;
      }catch(_){S.health=[];}
      const espnVenue=j?.events?.[0]?.competitions?.[0]?.venue?.fullName||'';
      S.venueName=espnVenue||ti2.venue||S.venueName;
      const ck2='bz-'+can(S.tournamentName).replace(/ /g,'').slice(0,18);
      localStorage.setItem('bz-current-key',ck2);
      localStorage.setItem(ck2,JSON.stringify({players:parsed.players,updated:S.updated,status:S.status,seen:allSeen,tournamentName:S.tournamentName,venueName:S.venueName,purse:usePurse}));
    }catch{}
  }catch(e){S.error=e.message||'Refresh failed'}
  S.refreshing=false;render();
}

  rows.sort((a,b)=>{if(a.missing&&!b.missing)return 1;if(!a.missing&&b.missing)return-1;if(a.pos==='CUT'&&b.pos!=='CUT')return 1;if(a.pos!=='CUT'&&b.pos==='CUT')return-1;return pv(a.pos)-pv(b.pos)});

function getStartDay(dateStr){
  if(!dateStr)return'THURSDAY';
  const[y,m,d]=dateStr.split('-').map(Number);
  const days=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  return days[new Date(y,m-1,d).getDay()];
}
function calcPO(purse,curveKey){
  // Each event maps to exactly ONE verified percentage table (see CURVES).
  // Payout = round(purse × table%). No renormalization / approximation — every
  // position reproduces the official money list to the dollar.
  const table=CURVES[curveKey]||PAYOUT_PCT;
  return table.map(p=>Math.round(purse*p));
}


// PO is dynamic - updated when tournament is detected
let PO=calcPO(10300000,'std'); // start with Byron Nelson (standard chart)
// Flat missed-cut payment for the current event. Our pool pays $0 for a missed
// cut at every event (mcPay is 0 across SCHED2026), so this stays 0.
let MC_PAY=0;


function projPay(pos,tieMap){
  if(!pos||pos==='WD')return 0; // not in field
  if(pos==='CUT')return MC_PAY;
  const rank=parseInt(pos.replace(/^T/,''),10);
  if(isNaN(rank))return 0;
  const n=tieMap[pos]||1;
  // A player who made the cut always earns at least the last listed (80th)
  // share. If a big tie at the cut line pushes finishers past position 80,
  // they get that minimum rather than $0 — matching how the Tour pays overflow.
  const floor=PO[PO.length-1];
  let sum=0;
  for(let i=0;i<n;i++){
    const idx=rank-1+i;
    sum+=idx<PO.length?PO[idx]:floor;
  }
  return Math.round(sum/n);
}

// Per-player payout. We switch to ESPN's exact official money (p.earnings — already
// reflects ties and amateur forfeits to the dollar) only once the WHOLE field's
// money has landed (S.moneyComplete), so we never mix real money for some golfers
// with projected money for others mid-finalize. Our pool pays $0 for a missed cut,
// so cut/WD always score zero. Otherwise we use the projected curve payout.
function payForPlayer(p,tieMap){
  if(!p)return 0;
  if(p.pos==='CUT'||p.pos==='WD')return 0;
  if(S.moneyComplete&&typeof p.earnings==='number')return p.earnings;
  return projPay(p.pos,tieMap);
}

// ── Accuracy guardrail ────────────────────────────────────────────────────────
// Runs every refresh; warnings surface in the header (invisible when all clear)
// and at window._app.health. These can't compare to official money mid-event (it
// doesn't exist until final) — they verify the numbers are internally trustworthy
// and catch the failure modes that actually bite:
//  • live purse missing -> the app fell back to a scheduled estimate that can be
//    stale (this silently mis-scaled the US Open), and
//  • once the field is locked (after the cut, or a no-cut event), the money paid
//    out should reconcile to the purse — a gross miss means a bad curve or cut.
function healthCheck(){
  const w=[];
  if(S.isPreTournament||!S.players||!S.players.length)return w;
  if(S.purseLive===false)
    w.push('Live purse unavailable — using estimate $'+Math.round(S.purse||0).toLocaleString()+'; totals may be scaled off.');
  // Reconcile paid money to the purse once the field is LOCKED. Skip the majors:
  // their purse includes missed-cut stipends our pool scores as $0, so it won't
  // tie out cleanly. (Standard + signature events pay only made-cut players.)
  //
  // "Locked" = final, or the cut is official (Round 3 has begun). We deliberately
  // do NOT treat a live Round-2 projected cut as locked: mid-round the projected
  // made-field is larger and looser than the eventual cut, and the "floor beyond
  // 80th" payouts push the sum a few % past the purse — a false alarm every cut
  // Saturday. Once R3 data exists the made-cut field is settled and the check is
  // meaningful again.
  const fieldLocked=S.isFinal||S.round>=3;
  const reconcilable=(S.curve==='std'||S.curve==='sig');
  if(fieldLocked&&reconcilable&&S.purse>0){
    const tieMap={};
    S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')tieMap[p.pos]=(tieMap[p.pos]||0)+1});
    let total=0;S.players.forEach(p=>{total+=payForPlayer(p,tieMap)});
    const off=Math.abs(total-S.purse)/S.purse;
    if(off>0.03)
      w.push('Payouts don’t reconcile to purse — off '+(off*100).toFixed(1)+'% (paid $'+Math.round(total).toLocaleString()+' vs purse $'+Math.round(S.purse).toLocaleString()+').');
  }
  return w;
}

function fmt$(v){
  if(v===0)return'—';
  return'$'+Math.round(v).toLocaleString('en-US');
}

// Expanded roster for one team in the Pool tab: its 16 players with live
// position/score/cut status and projected earnings. byC maps canonical name->live player.
function poolRoster(name,pm,byC){
  const entry=PT.find(t=>t[0]===name);
  if(!entry)return'';
  const rows=entry[1].map(idx=>{
    const pn=PL[idx],mk=matchToPool(pn),live=byC[mk];
    return{name:pn,g:getG(pn),pos:live?live.pos:null,total:live?live.total:'—',thru:live?live.thru:'',missing:!live,earn:pm[mk]||0};
  });
  rows.sort((a,b)=>{
    const rk=p=>p.missing?2:(p.pos==='CUT'||p.pos==='WD')?1:0;
    const d=rk(a)-rk(b);return d!==0?d:pv(a.pos)-pv(b.pos);
  });
  return`<div class="pool-roster">`+rows.map(p=>{
    const isCut=p.pos==='CUT',n=tv(p.total),sc=isCut?'cutsc':(n<0?'under':'');
    const posCell=p.missing?'—':isCut?icoScissors:esc(p.pos);
    const right=p.missing?`<span class="th-txt">not in field</span>`:`<span class="${sc}">${esc(p.total)}</span>`;
    return`<div class="row${isCut?' cutrow':''}${p.missing?' missing':''}"><div class="pos">${posCell}</div><div class="nc"><div class="nr"><span class="pname${isCut?' gc':''}">${esc(p.name)}</span></div><div class="mr">${!isCut&&!p.missing&&p.thru?`<span class="th-txt">${esc(p.thru)}</span>`:''}${p.earn?`<span class="pr-earn">${fmt$(p.earn)}</span>`:''}</div></div><div class="sc">${right}</div></div>`;
  }).join('')+`</div>`;
}

function poolHTML(){
  // Build tie map: pos→count of alive players at that position
  const tieMap={};
  S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')tieMap[p.pos]=(tieMap[p.pos]||0)+1});

  // Build pay map by player canonical name
  const pm={};
  S.players.forEach(p=>{pm[matchToPool(p.name)]=payForPlayer(p,tieMap)});
  // Map canonical name -> live player (for expanded rosters)
  const byC={};
  S.players.forEach(p=>{const k=can(p.name),mk=matchToPool(p.name);byC[k]=p;byC[mk]=p;});

  // Score each team: sum projected earnings across 16 picks
  const scored=PT.map(([name,picks])=>({
    name,
    earn:S.isPreTournament?0:picks.reduce((t,i)=>t+(pm[matchToPool(PL[i])]||0),0),
    fc:FM[name]||null
  }));
  scored.sort((a,b)=>b.earn-a.earn); // higher = better

  // Assign ranks
  let rank=1;
  scored.forEach((t,i)=>{if(i>0&&t.earn!==scored[i-1].earn)rank=i+1;t.rank=rank;});

  const q=S.stSearch.toLowerCase();
  const list=q?scored.filter(t=>t.name.toLowerCase().includes(q)):scored;

  const friendEntries=Object.entries(FM)
    .map(([name,color])=>{const f=scored.find(t=>t.name===name);return f?{name,color,rank:f.rank,earn:f.earn}:null;})
    .filter(Boolean)
    .sort((a,b)=>a.rank-b.rank)
    .map(({name,color,rank,earn})=>`<div class="strow st-f" style="--hl:${color}"><div class="st-rnk">${rank}</div><div class="st-nm fn">${esc(name)}</div><div class="st-sc">${fmt$(earn)}</div></div>`)
    .join('');
  let h=`<input class="st-search" id="st-search" placeholder="Search team name…" value="${esc(S.stSearch)}"/>`;
  if(!S.stSearch){
    h+=`<div style="margin-top:6px">${friendEntries}</div><div class="friends-div"></div>`;
  }
  h+=list.map(t=>{
    const open=S.poolOpen===t.name;
    let r=`<div class="strow strow-tap${t.fc?' st-f':''}${open?' open':''}"${t.fc?` style="--hl:${t.fc}"`:''} data-poolteam="${esc(t.name)}"><div class="st-rnk">${t.rank}</div><div class="st-nm${t.fc?' fn':''}">${esc(t.name)}</div><div class="st-sc">${fmt$(t.earn)}</div></div>`;
    if(open)r+=poolRoster(t.name,pm,byC);
    return r;
  }).join('');
  return h;
}


function getPoolRank(teamKey){
  if(S.isPreTournament)return'—';
  const tieMap={};
  S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')tieMap[p.pos]=(tieMap[p.pos]||0)+1});
  const pm={};
  S.players.forEach(p=>{pm[matchToPool(p.name)]=payForPlayer(p,tieMap)});
  const scored=PT.map(([name,picks])=>({
    name,earn:picks.reduce((t,i)=>t+(pm[matchToPool(PL[i])]||0),0)
  }));

  if(S.isPreTournament){
    const inField=t.picks.filter(p=>byC[matchToPool(p)]!==undefined).length;
    return`<section class="sum"><div class="sum-ttl">${icoTrophy}<span>${esc(t.name.toUpperCase())}</span></div>
<div class="srow">
  <div><div class="slbl">Best</div><div class="sval">—</div></div>
  <div><div class="slbl">Top Score</div><div class="sval">—</div></div>
  <div><div class="slbl">In Field</div><div class="sval">${inField}<span style="font-size:13px;color:#9A9A9A">/${t.picks.length}</span></div></div>
  <div><div class="slbl">Pool Rank</div><div class="sval">—</div></div>
  <div><div class="slbl">Projected</div><div class="sval">—</div></div>
</div></section>`;
  }
  const picks=t.picks.map(p=>byC[matchToPool(p)]||{missing:true});
  const alive=picks.filter(p=>!p.missing&&p.pos!=='CUT'&&p.pos!=='WD').sort((a,b)=>pv(a.pos)-pv(b.pos));
  const cut=picks.filter(p=>!p.missing&&p.pos==='CUT');
  const best=alive[0];
  const _tm={};S.players.forEach(p=>{if(p.pos&&p.pos!=='CUT'&&p.pos!=='WD')_tm[p.pos]=(_tm[p.pos]||0)+1});
  const _pm={};S.players.forEach(p=>{_pm[matchToPool(p.name)]=payForPlayer(p,_tm)});
  const _earn=S.isPreTournament?0:t.picks.reduce((tot,p)=>tot+(_pm[matchToPool(p)]||0),0);
  const projStr=_earn>0?'$'+Math.round(_earn).toLocaleString('en-US'):'—';
  return`<section class="sum"><div class="sum-ttl">${icoTrophy}<span>${esc(t.name.toUpperCase())}</span></div>
<div class="srow">
  <div><div class="slbl">Best</div><div class="sval">${best?esc(best.pos):'—'}</div></div>
  <div><div class="slbl">Top Score</div><div class="sval">${best?esc(best.total):'—'}</div></div>
  <div><div class="slbl">Alive</div><div class="sval">${alive.length}<span style="font-size:13px;color:#9A9A9A">/${t.picks.length}</span></div></div>
  <div><div class="slbl">Pool Rank</div><div class="sval">#${getPoolRank(S.team)}</div></div>
  <div><div class="slbl">${S.officialFinal?'Prize Money':'Projected'}</div><div class="sval">${projStr}</div></div>
</div></section>`;
}

// ── render ────────────────────────────────────────────────────────────────────
// When true, render() skips auto-focusing the search box (so tapping a team to
// expand its roster doesn't pop the mobile keyboard).
let skipFocus=false;
function render(){
  const t=TEAMS[S.team];
  document.getElementById('root').innerHTML=`<div class="app" style="--tc:${t.color}">
<header class="hdr">
  <div class="hdr-row">
    <div>
      <div class="kicker">${S.officialFinal?`<span class="final-kicker">${esc(S.tournamentName.toUpperCase())}<span class="final-tag">FINAL</span></span>`:S.isFinal?`<span class="final-kicker">${esc(S.tournamentName.toUpperCase())}<span class="final-tag" style="background:rgba(154,154,154,.16);border-color:rgba(154,154,154,.4);color:#9A9A9A">FINALIZING…</span></span>`:S.isPreTournament?`${esc(S.tournamentName.toUpperCase())} · STARTS ${getStartDay(S.startDate)}`:`${esc(S.tournamentName.toUpperCase())} · ROUND ${S.round}`}</div>
      <h1 class="title">Muirfielders</h1>
      <div class="subtitle">${esc(S.venueName)}</div>
    </div>
    <button class="rbtn${S.refreshing?' spinning':''}" id="rbtn">${icoRefresh}</button>
  </div>
  <div class="upd-row"><span class="dot"></span><span>${S.updated?'Live · '+S.updated:'Connecting…'}</span></div>
  ${S.error?`<div class="err">⚠ ${esc(S.error)}</div>`:''}
  ${(S.health&&S.health.length)?S.health.map(wn=>`<div class="err">⚠ ${esc(wn)}</div>`).join(''):''}
</header>
<div class="tsel">${Object.entries(TEAMS).map(([k,tm])=>`<button class="tbtn${S.team===k?' sel':''}" data-team="${k}" style="--tc:${tm.color}"><div class="tbtn-name">${esc(tm.short)}</div><div class="tbtn-lbl">${tm.init}</div></button>`).join('')}</div>
${summaryHTML()}
<nav class="tabs">
  <button class="tab${S.view==='board'?' active':''}" data-view="board">${icoList} Board</button>
  <button class="tab${S.view==='team'?' active':''}" data-view="team">${icoStar(S.view==='team'?'#C9A664':'currentColor')} Team</button>
  <button class="tab${S.view==='groups'?' active':''}" data-view="groups">${icoLayers} Groups</button>
  <button class="tab${S.view==='pool'?' active':''}" data-view="pool">${icoPool} Pool</button>
  <button class="tab${S.view==='combos'?' active':''}" data-view="combos">${icoFind} Combos</button>
</nav>
<main class="main">${S.view==='board'?boardHTML():S.view==='team'?teamHTML():S.view==='groups'?groupsHTML():S.view==='combos'?combosHTML():poolHTML()}</main>

</div>`;

  const ss=document.getElementById('st-search');
  if(ss){
    ss.oninput=e=>{
      const pos=e.target.selectionStart;
      S.stSearch=e.target.value;
      render();
      const ns=document.getElementById('st-search');
      if(ns){ns.focus();ns.setSelectionRange(pos,pos);}
    };
    if(S.view==='pool'&&!skipFocus){ss.focus();ss.setSelectionRange(ss.value.length,ss.value.length);}
  }

  const cs=document.getElementById('cb-search');
  if(cs){
    cs.oninput=e=>{
      const pos=e.target.selectionStart;
      S.comboSearch=e.target.value;
      render();
      const ns=document.getElementById('cb-search');
      if(ns){ns.focus();ns.setSelectionRange(pos,pos);}
    };
    if(S.view==='combos'){cs.focus();cs.setSelectionRange(cs.value.length,cs.value.length);}
  }

}

// ── init ──────────────────────────────────────────────────────────────────────
render();
fetchData();

// Single delegated listener - survives re-renders, reliable on mobile
document.getElementById('root').addEventListener('click',function(e){
  const b=e.target.closest('#rbtn,[data-team],[data-view],[data-group],[data-back],[data-nif],[data-cbadd],[data-cbdel],[data-poolteam]');
  if(!b)return;
  if(b.id==='rbtn'){if(!S.refreshing)fetchData();return;}
  if(b.dataset.cbadd){if(!S.comboSel.includes(b.dataset.cbadd))S.comboSel.push(b.dataset.cbadd);S.comboSearch='';render();return;}
  if(b.dataset.cbdel){S.comboSel=S.comboSel.filter(c=>c!==b.dataset.cbdel);render();return;}
  if(b.dataset.poolteam){S.poolOpen=S.poolOpen===b.dataset.poolteam?null:b.dataset.poolteam;skipFocus=true;render();skipFocus=false;return;}
  if(b.dataset.team){S.team=b.dataset.team;try{localStorage.setItem('bz-team',S.team)}catch{}render();return;}
  if(b.dataset.view){S.view=b.dataset.view;if(S.view==='groups')S.group=null;render();return;}
  if(b.dataset.group){S.group=+b.dataset.group;render();return;}
  if(b.hasAttribute('data-back')){S.group=null;render();return;}
  if(b.hasAttribute('data-nif')){S.nifExpanded=!S.nifExpanded;render();return;}
});

let intv=setInterval(()=>{if(!document.hidden&&!S.refreshing)fetchData()},60000);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)clearInterval(intv);
  else{fetchData();intv=setInterval(()=>{if(!S.refreshing)fetchData()},60000)}
});
})();
</script>
</body>
</html>
